<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJJ Training Notes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #111;
    color: #e0e0e0;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 1.5rem;
    padding: env(safe-area-inset-top, 1.5rem) env(safe-area-inset-right, 1.5rem) env(safe-area-inset-bottom, 1.5rem) env(safe-area-inset-left, 1.5rem);
  }

  .container {
    max-width: 540px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 2rem 0 1rem;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: #555;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── Record button ── */
  .record-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    padding: 2rem 0 2.5rem;
  }

  .record-btn {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: #c0392b;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.2s, box-shadow 0.3s;
    box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
    -webkit-tap-highlight-color: transparent;
  }

  .record-btn:active {
    transform: scale(0.93);
  }

  .record-btn svg {
    width: 36px;
    height: 36px;
    fill: #fff;
  }

  .record-btn.recording {
    background: #e74c3c;
  }

  .record-btn.recording svg {
    width: 28px;
    height: 28px;
    border-radius: 4px;
  }

  .record-label {
    font-size: 0.85rem;
    color: #666;
    font-weight: 400;
  }

  .record-label.active {
    color: #e74c3c;
    font-variant-numeric: tabular-nums;
  }


  /* ── Notes list ── */
  .notes-header {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #444;
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .notes-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    padding-bottom: 2rem;
  }

  .note {
    background: #161616;
    border-radius: 10px;
    padding: 1rem 1.2rem;
    border-left: 3px solid #222;
    transition: border-color 0.2s;
  }

  .note:hover {
    border-left-color: #333;
  }

  .note-date {
    font-size: 0.75rem;
    color: #555;
    margin-bottom: 0.6rem;
    font-weight: 500;
  }

  .note-text {
    line-height: 1.65;
    white-space: pre-wrap;
    font-size: 0.92rem;
    color: #bbb;
  }

  .note-actions {
    margin-top: 0.8rem;
  }

  .note-actions button {
    background: none;
    border: none;
    color: #444;
    padding: 0.2rem 0;
    font-size: 0.7rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .note-actions button:hover {
    color: #e74c3c;
  }

  .empty {
    color: #444;
    text-align: center;
    font-size: 0.9rem;
    padding: 3rem 0;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="container">

<header>
  <h1>BJJ Training Notes</h1>
</header>

<div class="record-wrap">
  <button class="record-btn" id="recordBtn" aria-label="Record">
    <svg id="micIcon" viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm-1-9a1 1 0 1 1 2 0v6a1 1 0 1 1-2 0V5zm6 6a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/></svg>
    <svg id="stopIcon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
  </button>
  <span class="record-label" id="recordLabel">Tap to record</span>
</div>

<div id="notesSection">
  <div class="notes-header" id="notesHeader"></div>
  <div class="notes-list" id="notesList"></div>
</div>

</div>

<script>
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    document.getElementById('btnLabel').textContent = 'Speech not supported — use Chrome';
    document.getElementById('recordBtn').disabled = true;
  }

  let recognition;
  let isRecording = false;
  let fullTranscript = '';
  let timerInterval;
  let recordingStart;

  const recordBtn = document.getElementById('recordBtn');
  const recordLabel = document.getElementById('recordLabel');
  const micIcon = document.getElementById('micIcon');
  const stopIcon = document.getElementById('stopIcon');
  const notesList = document.getElementById('notesList');
  const notesHeader = document.getElementById('notesHeader');

  function formatTimer(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }

  function getNotes() {
    return JSON.parse(localStorage.getItem('bjj-notes') || '[]');
  }

  function saveNotes(notes) {
    localStorage.setItem('bjj-notes', JSON.stringify(notes));
  }

  function renderNotes() {
    const notes = getNotes();
    if (notes.length === 0) {
      notesHeader.textContent = '';
      notesList.innerHTML = '<p class="empty">No notes yet.<br>Tap the mic after your next session.</p>';
      return;
    }
    notesHeader.textContent = 'Previous Sessions';
    notesList.innerHTML = notes.map((note, i) => `
      <div class="note">
        <div class="note-date">${new Date(note.date).toLocaleDateString('en-US', {
          weekday: 'short', month: 'short', day: 'numeric',
          hour: 'numeric', minute: '2-digit'
        })}</div>
        <div class="note-text">${escapeHtml(note.text)}</div>
        <div class="note-actions">
          <button onclick="deleteNote(${i})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function deleteNote(index) {
    if (!confirm('Delete this note?')) return;
    const notes = getNotes();
    notes.splice(index, 1);
    saveNotes(notes);
    renderNotes();
  }

  function startRecording() {
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    fullTranscript = '';
    isRecording = true;
    recordingStart = Date.now();
    recordBtn.classList.add('recording');
    micIcon.style.display = 'none';
    stopIcon.style.display = 'block';
    recordLabel.classList.add('active');
    recordLabel.textContent = '0:00';
    timerInterval = setInterval(() => {
      recordLabel.textContent = formatTimer(Date.now() - recordingStart);
    }, 1000);
    recognition.onresult = (event) => {
      let interim = '';
      fullTranscript = '';
      for (let i = 0; i < event.results.length; i++) {
        const result = event.results[i];
        if (result.isFinal) {
          fullTranscript += result[0].transcript + ' ';
        } else {
          interim += result[0].transcript;
        }
      }
    };

    recognition.onerror = (event) => {
      if (event.error === 'no-speech') return; // ignore silence
      console.error('Speech error:', event.error);
    };

    // Auto-restart if the browser stops listening (happens after ~60s of silence)
    recognition.onend = () => {
      if (isRecording) {
        recognition.start();
      }
    };

    recognition.start();
  }

  function stopRecording() {
    isRecording = false;
    recognition.stop();
    clearInterval(timerInterval);
    recordBtn.classList.remove('recording');
    micIcon.style.display = 'block';
    stopIcon.style.display = 'none';
    recordLabel.classList.remove('active');
    recordLabel.textContent = 'Tap to record';

    const text = fullTranscript.trim();
    if (text) {
      const notes = getNotes();
      notes.unshift({ date: new Date().toISOString(), text });
      saveNotes(notes);
      renderNotes();
    }
  }

  recordBtn.addEventListener('click', () => {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  });

  renderNotes();
</script>

</body>
</html>
