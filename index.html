<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJJ Training Notes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #111;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 1.5rem;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    color: #fff;
  }

  .record-btn {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.8rem 1.4rem;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #c0392b;
    color: #fff;
    font-weight: 500;
    transition: background 0.2s;
  }

  .record-btn:hover { background: #e74c3c; }

  .record-btn.recording {
    background: #e74c3c;
    animation: pulse 1.2s infinite;
  }

  .record-btn .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    flex-shrink: 0;
  }

  .record-btn.recording .dot {
    background: #fff;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .live-text {
    margin-top: 1rem;
    padding: 1rem;
    background: #1a1a1a;
    border-radius: 8px;
    min-height: 3rem;
    font-style: italic;
    color: #999;
    display: none;
    line-height: 1.5;
  }

  .live-text.active { display: block; }

  .notes-list {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .note {
    background: #1a1a1a;
    border-radius: 8px;
    padding: 1rem;
  }

  .note-date {
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 0.5rem;
  }

  .note-text {
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .note-actions {
    margin-top: 0.6rem;
    display: flex;
    gap: 0.5rem;
  }

  .note-actions button {
    background: none;
    border: 1px solid #333;
    color: #888;
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
    font-size: 0.75rem;
    cursor: pointer;
  }

  .note-actions button:hover {
    border-color: #666;
    color: #ccc;
  }

  .empty {
    color: #555;
    margin-top: 2rem;
    font-size: 0.95rem;
  }
</style>
</head>
<body>

<h1>BJJ Training Notes</h1>

<button class="record-btn" id="recordBtn">
  <span class="dot"></span>
  <span id="btnLabel">Start Recording</span>
</button>

<div class="live-text" id="liveText"></div>

<div class="notes-list" id="notesList"></div>

<script>
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    document.getElementById('btnLabel').textContent = 'Speech not supported — use Chrome';
    document.getElementById('recordBtn').disabled = true;
  }

  let recognition;
  let isRecording = false;
  let fullTranscript = '';

  const recordBtn = document.getElementById('recordBtn');
  const btnLabel = document.getElementById('btnLabel');
  const liveText = document.getElementById('liveText');
  const notesList = document.getElementById('notesList');

  function getNotes() {
    return JSON.parse(localStorage.getItem('bjj-notes') || '[]');
  }

  function saveNotes(notes) {
    localStorage.setItem('bjj-notes', JSON.stringify(notes));
  }

  function renderNotes() {
    const notes = getNotes();
    if (notes.length === 0) {
      notesList.innerHTML = '<p class="empty">No notes yet. Hit record after your next session.</p>';
      return;
    }
    notesList.innerHTML = notes.map((note, i) => `
      <div class="note">
        <div class="note-date">${new Date(note.date).toLocaleDateString('en-US', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
          hour: 'numeric', minute: '2-digit'
        })}</div>
        <div class="note-text">${escapeHtml(note.text)}</div>
        <div class="note-actions">
          <button onclick="deleteNote(${i})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function deleteNote(index) {
    if (!confirm('Delete this note?')) return;
    const notes = getNotes();
    notes.splice(index, 1);
    saveNotes(notes);
    renderNotes();
  }

  function startRecording() {
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    fullTranscript = '';
    isRecording = true;
    recordBtn.classList.add('recording');
    btnLabel.textContent = 'Stop Recording';
    liveText.classList.add('active');
    liveText.textContent = 'Listening...';

    recognition.onresult = (event) => {
      let interim = '';
      fullTranscript = '';
      for (let i = 0; i < event.results.length; i++) {
        const result = event.results[i];
        if (result.isFinal) {
          fullTranscript += result[0].transcript + ' ';
        } else {
          interim += result[0].transcript;
        }
      }
      liveText.textContent = fullTranscript + interim || 'Listening...';
    };

    recognition.onerror = (event) => {
      if (event.error === 'no-speech') return; // ignore silence
      console.error('Speech error:', event.error);
    };

    // Auto-restart if the browser stops listening (happens after ~60s of silence)
    recognition.onend = () => {
      if (isRecording) {
        recognition.start();
      }
    };

    recognition.start();
  }

  function stopRecording() {
    isRecording = false;
    recognition.stop();
    recordBtn.classList.remove('recording');
    btnLabel.textContent = 'Start Recording';

    const text = fullTranscript.trim();
    if (text) {
      const notes = getNotes();
      notes.unshift({ date: new Date().toISOString(), text });
      saveNotes(notes);
      renderNotes();
    }

    liveText.classList.remove('active');
    liveText.textContent = '';
  }

  recordBtn.addEventListener('click', () => {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  });

  renderNotes();
</script>

</body>
</html>
